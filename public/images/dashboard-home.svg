  <text x="1020" y="230" font-family="Arial" font-size="16" fill="#e2e8f0" font-weight="bold">Alertas Pendientes</text>
  
  <!-- Alert Items -->
  <rect x="1020" y="250" width="420" height="60" rx="8" fill="rgba(51,65,85,0.3)"/>
  <circle cx="1050" cy="280" r="15" fill="rgba(59,130,246,0.2)"/>
  <text x="1045" y="285" font-family="Arial" font-size="14" fill="#3b82f6">🐟</text>
  <text x="1080" y="275" font-family="Arial" font-size="14" fill="#e2e8f0">Tilapia lista para cosecha</text>
  <text x="1080" y="295" font-family="Arial" font-size="12" fill="#94a3b8">Estanque 1 - 3 días</text>
  
  <rect x="1020" y="320" width="420" height="60" rx="8" fill="rgba(51,65,85,0.3)"/>
  <circle cx="1050" cy="350" r="15" fill="rgba(245,158,11,0.2)"/>
  <text x="1045" y="355" font-family="Arial" font-size="14" fill="#f59e0b">⚠️</text>
  <text x="1080" y="345" font-family="Arial" font-size="14" fill="#e2e8f0">Comprar alimento gallinas</text>
  <text x="1080" y="365" font-family="Arial" font-size="12" fill="#94a3b8">50 kg restantes</text>
  
  <rect x="1020" y="390" width="420" height="60" rx="8" fill="rgba(51,65,85,0.3)"/>
  <circle cx="1050" cy="420" r="15" fill="rgba(239,68,68,0.2)"/>
  <text x="1045" y="425" font-family="Arial" font-size="14" fill="#ef4444">💰</text>
  <text x="1080" y="415" font-family="Arial" font-size="14" fill="#e2e8f0">Pago proveedor pendiente</text>
  <text x="1080" y="435" font-family="Arial" font-size="12" fill="#94a3b8">$500,000</text>
  
  <!-- Footer Text -->
  <text x="960" y="1060" font-family="Arial" font-size="14" fill="#64748b" text-anchor="middle">🌿 AgroControl - Dashboard de Producción Animal</text>
