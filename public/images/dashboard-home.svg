  <text x="600" y="145" font-family="Arial" font-size="24" fill="#e2e8f0" font-weight="bold">380 kg</text>
  <text x="600" y="165" font-family="Arial" font-size="12" fill="#22c55e">+8%</text>
  
  <rect x="880" y="80" width="280" height="100" rx="12" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="900" y="110" font-family="Arial" font-size="14" fill="#94a3b8">Crecimiento</text>
  <text x="900" y="145" font-family="Arial" font-size="24" fill="#e2e8f0" font-weight="bold">+12%</text>
  <text x="900" y="165" font-family="Arial" font-size="12" fill="#22c55e">+3%</text>
  
  <rect x="1180" y="80" width="280" height="100" rx="12" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
