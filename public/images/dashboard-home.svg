  <text x="300" y="165" font-family="Arial" font-size="12" fill="#22c55e">+12%</text>
  
  <rect x="580" y="80" width="280" height="100" rx="12" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
