  <rect x="320" y="400" width="80" height="80" fill="#22c55e" rx="4"/>
  <rect x="320" y="440" width="80" height="40" fill="#ef4444" rx="4"/>
  
  <rect x="420" y="380" width="80" height="100" fill="#22c55e" rx="4"/>
  <rect x="420" y="430" width="80" height="50" fill="#ef4444" rx="4"/>
  
  <rect x="520" y="360" width="80" height="120" fill="#22c55e" rx="4"/>
  <rect x="520" y="420" width="80" height="60" fill="#ef4444" rx="4"/>
  
  <rect x="620" y="350" width="80" height="130" fill="#22c55e" rx="4"/>
  <rect x="620" y="410" width="80" height="70" fill="#ef4444" rx="4"/>
  
  <rect x="720" y="360" width="80" height="120" fill="#22c55e" rx="4"/>
  <rect x="720" y="415" width="80" height="65" fill="#ef4444" rx="4"/>
  
  <rect x="820" y="340" width="80" height="140" fill="#22c55e" rx="4"/>
  <rect x="820" y="400" width="80" height="80" fill="#ef4444" rx="4"/>
  
