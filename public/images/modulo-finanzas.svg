  <text x="1100" y="110" font-family="Arial" font-size="16" fill="#ef4444" font-weight="bold">📉 Gastos del Mes</text>
  <text x="1100" y="160" font-family="Arial" font-size="36" fill="#ef4444" font-weight="bold">$2,300,000</text>
  
  <!-- Expense Details -->
