  <rect x="300" y="180" width="740" height="40" rx="4" fill="rgba(51,65,85,0.3)"/>
  <text x="320" y="205" font-family="Arial" font-size="14" fill="#94a3b8">Huevos gallina</text>
  <text x="980" y="205" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="end">$1,250,000</text>
  
  <rect x="300" y="230" width="740" height="40" rx="4" fill="transparent"/>
