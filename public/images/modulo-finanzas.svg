  <text x="980" y="255" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="end">$640,000</text>
  
  <rect x="300" y="280" width="740" height="40" rx="4" fill="rgba(51,65,85,0.3)"/>
