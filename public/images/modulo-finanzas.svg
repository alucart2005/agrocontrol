  <!-- Button -->
  <rect x="1600" y="12" width="200" height="40" rx="8" fill="#22c55e"/>
  <text x="1620" y="38" font-family="Arial" font-size="14" fill="white" font-weight="bold">+ Nueva Transacción</text>
  
  <!-- Incomes Card -->
  <rect x="280" y="80" width="780" height="280" rx="12" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="300" y="110" font-family="Arial" font-size="16" fill="#22c55e" font-weight="bold">📈 Ingresos del Mes</text>
  <text x="300" y="160" font-family="Arial" font-size="36" fill="#22c55e" font-weight="bold">$4,100,000</text>
  
