  <!-- Logo -->
  <text x="30" y="50" font-family="Arial" font-size="20" fill="#22c55e" font-weight="bold">🌿 AgroControl</text>
  
  <!-- Menu Items -->
  <rect x="16" y="100" width="224" height="40" rx="8" fill="transparent"/>
  <text x="50" y="125" font-family="Arial" font-size="14" fill="#94a3b8">📊 Dashboard</text>
  
  <rect x="16" y="150" width="224" height="40" rx="8" fill="transparent"/>
  <text x="50" y="175" font-family="Arial" font-size="14" fill="#94a3b8">🐟 Peces</text>
  
  <rect x="16" y="350" width="224" height="40" rx="8" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="1"/>
  <text x="50" y="375" font-family="Arial" font-size="14" fill="#22c55e">💰 Finanzas</text>
  
  <!-- Header -->
