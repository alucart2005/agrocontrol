  <text x="1120" y="205" font-family="Arial" font-size="14" fill="#94a3b8">Alimento</text>
  <text x="1780" y="205" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="end">$1,500,000</text>
  
  <rect x="1100" y="230" width="740" height="40" rx="4" fill="transparent"/>
  <text x="1120" y="255" font-family="Arial" font-size="14" fill="#94a3b8">Medicina</text>
  <text x="1780" y="255" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="end">$400,000</text>
  
  <rect x="1100" y="280" width="740" height="40" rx="4" fill="rgba(51,65,85,0.3)"/>
  <text x="1120" y="305" font-family="Arial" font-size="14" fill="#94a3b8">Infraestructura</text>
  <text x="1780" y="305" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="end">$300,000</text>
  
  <rect x="1100" y="330" width="740" height="40" rx="4" fill="transparent"/>
  <text x="1120" y="355" font-family="Arial" font-size="14" fill="#94a3b8">Otros</text>
  <text x="1780" y="355" font-family="Arial" font-size="14" fill="#e2e8f0" text-anchor="end">$100,000</text>
  
  <!-- Profit Card -->
  <rect x="280" y="380" width="1600" height="120" rx="12" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="300" y="410" font-family="Arial" font-size="16" fill="#e2e8f0" font-weight="bold">💰 Utilidad del Mes</text>
  <text x="300" y="460" font-family="Arial" font-size="36" fill="#22c55e" font-weight="bold">$1,800,000</text>
  <text x="600" y="460" font-family="Arial" font-size="16" fill="#22c55e">+43.9% margen</text>
  
  <!-- Footer -->
  <text x="960" y="1060" font-family="Arial" font-size="14" fill="#64748b" text-anchor="middle">💰 Módulo de Finanzas - AgroControl</text>
